apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "moo.fullname" . }}-worker
  labels:
    {{- include "moo.workerLabels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount.worker }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "moo.workerSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "moo.workerSelectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "moo.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["celery"]
          env:
          - name: DJANGO_SETTINGS_MODULE
            value: {{ .Values.moo.django.settings }}
          - name: AWS_DEFAULT_REGION
            value: {{ .Values.moo.aws.region }}
          - name: AWS_STS_REGIONAL_ENDPOINTS
            value: regional
          {{- with .Values.env }}
            {{- toYaml . | nindent 10 }}
          {{- end }}
          livenessProbe:
            exec:
              command:
              - /usr/local/bin/worker-liveness.sh
          readinessProbe:
            exec:
              command:
              - /usr/local/bin/worker-readiness.sh
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
