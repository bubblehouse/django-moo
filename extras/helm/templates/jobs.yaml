apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "moo.fullname" . }}-jobs
  labels:
    {{- include "moo.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
spec:
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      restartPolicy: Never
      serviceAccountName: {{ include "moo.serviceAccountName" . }}
      containers:
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          command: [./manage.py, migrate, --no-input]
          env:
          - name: DJANGO_SETTINGS_MODULE
            value: {{ .Values.moo.django.settings }}
          - name: AWS_DEFAULT_REGION
            value: {{ .Values.moo.aws.region }}
          - name: AWS_STS_REGIONAL_ENDPOINTS
            value: regional
          {{- with .Values.env }}
            {{- toYaml . | nindent 10 }}
          {{- end }}
        - name: collectstatic
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          command: [./manage.py, collectstatic, --no-input]
          env:
          - name: DJANGO_SETTINGS_MODULE
            value: {{ .Values.moo.django.settings }}
          - name: AWS_DEFAULT_REGION
            value: {{ .Values.moo.aws.region }}
          - name: AWS_STS_REGIONAL_ENDPOINTS
            value: regional
          {{- with .Values.env }}
            {{- toYaml . | nindent 10 }}
          {{- end }}
